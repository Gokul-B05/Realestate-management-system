# ── Spring Boot Production Profile ────────────────────────────────────────────
# Activated by: SPRING_PROFILES_ACTIVE=prod  (set in Render env vars)

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ── Connection Pooling (HikariCP) ─────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# IMPORTANT: Use 'validate' in production — never 'update' or 'create'
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.realestate.project=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR

# ── Application ───────────────────────────────────────────────────────────────
spring.application.name=realestate
server.port=8080

# ── CORS (update ALLOWED_ORIGINS env var to your Render frontend URL) ─────────
# Example: https://realestate-frontend.onrender.com
