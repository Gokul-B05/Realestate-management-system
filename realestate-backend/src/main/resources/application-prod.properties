# Production Configuration Profile

# Database Schema Management (Safety first - never modify or update schemas in production automatically)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Production Log levels (Avoid TRACE and DEBUG to optimize CPU/IO performance)
logging.level.com.realestate.project=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

# Reliability and Cloud-native Graceful Shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
