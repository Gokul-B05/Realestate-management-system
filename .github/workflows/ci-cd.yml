name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ================= BACKEND BUILD & TEST =================
  backend-ci:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & Run Tests
        run: |
          cd realestate-backend
          mvn clean package -B

  # ================= FRONTEND BUILD & LINT =================
  frontend-ci:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: realestate-frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd realestate-frontend
          npm ci

      - name: Run Linter
        run: |
          cd realestate-frontend
          npm run lint --if-present

      - name: Build Static Assets
        run: |
          cd realestate-frontend
          npm run build

  # ================= DOCKER BUILD VERIFICATION =================
  docker-ci:
    name: Verify Docker Builds
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image (Dry-run)
        uses: docker/build-push-action@v5
        with:
          context: ./realestate-backend
          file: ./realestate-backend/Dockerfile
          push: false
          tags: realestate-backend:test

      - name: Build Frontend Image (Dry-run)
        uses: docker/build-push-action@v5
        with:
          context: ./realestate-frontend
          file: ./realestate-frontend/Dockerfile
          push: false
          tags: realestate-frontend:test
